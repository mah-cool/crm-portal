<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff sign in — [Company Name]</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 48 32" width="44" height="30" role="img" aria-label="Lorry icon">
            <rect x="1" y="6" width="28" height="16" rx="2" fill="currentColor"/>
            <path d="M29 11h8l6 6v5H29z" fill="currentColor"/>
            <circle cx="12" cy="24" r="4" fill="#0b1f33" stroke="currentColor" stroke-width="2"/>
            <circle cx="36" cy="24" r="4" fill="#0b1f33" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="logo-text">[Company Name]</span>
      </a>
      <nav class="main-nav"><ul class="nav-list"><li><a href="index.html">← Back to site</a></li></ul></nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Staff sign in</h1>
      <p class="auth-sub">Access the CRM &amp; stock system.</p>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        <p class="form-note" id="login-note" role="status" aria-live="polite"></p>
      </form>

      <p class="auth-foot">No account? Your administrator can create one for you.</p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    var loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      Auth.submit('/api/login', {
        email: loginForm.email.value, password: loginForm.password.value
      }, document.getElementById('login-note'), 'app.html');
    });
  </script>
</body>
</html>
